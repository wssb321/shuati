# Steam刷题管家 - Nginx 配置文件
# 适用于单页应用 (SPA) + 静态资源 + API代理

# 用户和进程配置
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # 基础配置
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/xml+rss image/svg+xml font/woff2;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 上传大小限制
    client_max_body_size 10M;

    # 速率限制
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # 速率限制规则
    limit_req zone=api burst=20 nodelay;

    # ============ HTTP 到 HTTPS 重定向 ============
    server {
        listen 80;
        listen [::]:80;
        server_name www.zzrbsw.xyz zzrbsw.xyz;

        # 强制 HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ============ HTTPS 服务器配置 ============
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name www.zzrbsw.xyz zzrbsw.xyz;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # 文档根目录 - 重要！
        root /var/www/shuati/dist;
        index index.html;

        # 字符集
        charset utf-8;

        # ============ 静态资源缓存策略 ============

        # HTML - 不缓存
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 静态资源 - 长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;

            # CORS配置
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }

        # JS/CSS 文件 - 额外配置
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            etag on;
            access_log off;

            # CORS配置
            add_header Access-Control-Allow-Origin "*";
        }

        # ============ 题库文件配置 ============
        location /tiku/ {
            alias /var/www/shuati/dist/tiku/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Access-Control-Allow-Origin "*";

            # 允许跨域
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # 文件类型
            add_header Content-Type "text/plain; charset=utf-8";
            try_files $uri =404;
        }

        # ============ PWA 配置文件 ============
        location = /manifest.json {
            expires 1h;
            add_header Content-Type "application/json";
        }

        location = /steam.png {
            expires 30d;
            add_header Cache-Control "public";
        }

        # ============ SPA 路由配置 - 核心！ ============
        location / {
            # 关键：尝试查找文件，如果不存在则返回 index.html
            try_files $uri $uri/ /index.html;

            # CORS配置
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            # OPTIONS 请求处理
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # ============ API 代理（如有需要）============
        # location /api/ {
        #     proxy_pass http://localhost:3000/api/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_cache_bypass $http_upgrade;
        # }

        # ============ 错误页面 ============
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # ============ 禁止访问隐藏文件 ============
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============ 安全防护 ============
        # 防止点击劫持
        add_header X-Frame-Options "SAMEORIGIN" always;

        # 防止XSS
        add_header X-Content-Type-Options "nosniff" always;

        # 防止MIME类型嗅探
        add_header X-Content-Type-Options "nosniff" always;

        # 防护
        location ~ /\.(?!well-known) {
            deny all;
        }

        # 日志文件
        access_log /var/log/nginx/shuati_access.log;
        error_log /var/log/nginx/shuati_error.log;
    }
}
